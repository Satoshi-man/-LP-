<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>B型肝炎給付金 トークスクリプト支援ツール</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #1a2b4a;
      --navy-dark: #0f1e35;
      --gold: #c8a951;
      --gold-light: #e8d080;
      --gray-bg: #f5f6f8;
      --text: #2d2d2d;
      --text-light: #666;
      --white: #fff;
      --green: #27ae60;
      --green-light: #eafaf1;
      --blue: #2980b9;
      --blue-light: #ebf5fb;
      --orange: #e67e22;
      --orange-light: #fef5e7;
      --red: #c0392b;
      --border: #dde1e8;
    }

    body {
      font-family: "Noto Sans JP", "Hiragino Sans", "Yu Gothic", sans-serif;
      color: var(--text);
      line-height: 1.8;
      font-size: 15px;
      background: var(--gray-bg);
      min-height: 100vh;
    }

    /* Header */
    .app-header {
      background: var(--navy);
      color: var(--white);
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,.15);
    }

    .app-header h1 {
      font-size: 1rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .app-header .badge {
      background: var(--gold);
      color: var(--navy);
      font-size: .65rem;
      font-weight: 800;
      padding: 2px 8px;
      border-radius: 3px;
      letter-spacing: .05em;
    }

    .app-header .internal {
      font-size: .7rem;
      color: var(--gold-light);
      font-weight: 400;
    }

    /* Layout */
    .app-container {
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 0;
      max-width: 1400px;
      margin: 0 auto;
      min-height: calc(100vh - 56px);
    }

    /* Left Panel */
    .input-panel {
      background: var(--white);
      border-right: 1px solid var(--border);
      padding: 24px;
      overflow-y: auto;
      max-height: calc(100vh - 56px);
      position: sticky;
      top: 56px;
    }

    .panel-title {
      font-size: .85rem;
      font-weight: 700;
      color: var(--navy);
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 2px solid var(--gold);
    }

    /* Quick tags */
    .quick-tags {
      margin-bottom: 20px;
    }

    .quick-tags-label {
      font-size: .75rem;
      font-weight: 700;
      color: var(--text-light);
      margin-bottom: 8px;
      letter-spacing: .05em;
    }

    .tag-group {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .tag-btn {
      background: var(--gray-bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 5px 14px;
      font-size: .78rem;
      cursor: pointer;
      transition: all .15s;
      color: var(--text);
      font-family: inherit;
    }

    .tag-btn:hover {
      background: var(--navy);
      color: var(--white);
      border-color: var(--navy);
    }

    .tag-btn.active {
      background: var(--navy);
      color: var(--white);
      border-color: var(--navy);
    }

    /* Memo area */
    .memo-area {
      margin-bottom: 20px;
    }

    .memo-area label {
      display: block;
      font-size: .8rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 6px;
    }

    .memo-area textarea {
      width: 100%;
      height: 120px;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px;
      font-size: .88rem;
      font-family: inherit;
      line-height: 1.7;
      resize: vertical;
      transition: border-color .2s;
    }

    .memo-area textarea:focus {
      outline: none;
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(200,169,81,.15);
    }

    .memo-area textarea::placeholder {
      color: #aab;
    }

    .char-count {
      text-align: right;
      font-size: .7rem;
      color: var(--text-light);
      margin-top: 4px;
    }

    /* Customer info */
    .customer-info {
      margin-bottom: 20px;
    }

    .info-row {
      display: flex;
      gap: 12px;
      margin-bottom: 10px;
    }

    .info-field {
      flex: 1;
    }

    .info-field label {
      display: block;
      font-size: .75rem;
      font-weight: 600;
      color: var(--text-light);
      margin-bottom: 4px;
    }

    .info-field select,
    .info-field input {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 5px;
      font-size: .82rem;
      font-family: inherit;
      background: var(--white);
    }

    .info-field select:focus,
    .info-field input:focus {
      outline: none;
      border-color: var(--gold);
    }

    /* Generate button */
    .generate-btn {
      width: 100%;
      padding: 14px;
      background: var(--gold);
      color: var(--navy);
      border: none;
      border-radius: 6px;
      font-size: .95rem;
      font-weight: 800;
      cursor: pointer;
      transition: opacity .2s;
      font-family: inherit;
      letter-spacing: .03em;
    }

    .generate-btn:hover {
      opacity: .85;
    }

    .generate-btn:active {
      transform: scale(.98);
    }

    .btn-row {
      display: flex;
      gap: 10px;
    }

    .btn-row .generate-btn {
      flex: 1;
    }

    .clear-btn {
      padding: 14px 20px;
      background: var(--white);
      color: var(--text-light);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: .85rem;
      font-weight: 700;
      cursor: pointer;
      transition: all .15s;
      font-family: inherit;
      white-space: nowrap;
    }

    .clear-btn:hover {
      background: var(--red);
      color: var(--white);
      border-color: var(--red);
    }

    .clear-btn:active {
      transform: scale(.98);
    }

    /* Right Panel */
    .output-panel {
      padding: 24px 32px;
      overflow-y: auto;
      max-height: calc(100vh - 56px);
    }

    /* Script cards */
    .script-section {
      margin-bottom: 28px;
    }

    .script-section-title {
      font-size: .8rem;
      font-weight: 700;
      color: var(--white);
      background: var(--navy);
      padding: 8px 16px;
      border-radius: 6px 6px 0 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .script-section-title .icon {
      font-size: 1rem;
    }

    .script-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-top: none;
      border-radius: 0 0 6px 6px;
      padding: 20px;
      box-shadow: 0 2px 6px rgba(0,0,0,.04);
    }

    .script-label {
      font-size: .7rem;
      font-weight: 700;
      letter-spacing: .1em;
      margin-bottom: 6px;
      padding: 2px 8px;
      border-radius: 3px;
      display: inline-block;
    }

    .label-concern {
      background: #fdecea;
      color: var(--red);
    }

    .label-response {
      background: var(--green-light);
      color: var(--green);
    }

    .label-point {
      background: var(--blue-light);
      color: var(--blue);
    }

    .label-close {
      background: var(--orange-light);
      color: var(--orange);
    }

    .script-text {
      font-size: .9rem;
      line-height: 2;
      color: var(--text);
      margin-bottom: 12px;
    }

    .script-text strong {
      color: var(--navy);
      background: linear-gradient(transparent 60%, rgba(200,169,81,.25) 60%);
    }

    .script-text .emphasis {
      color: var(--red);
      font-weight: 700;
    }

    .script-divider {
      border: none;
      border-top: 1px dashed var(--border);
      margin: 16px 0;
    }

    /* Strength badge */
    .strength-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: var(--gold);
      color: var(--navy);
      font-size: .7rem;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 3px;
      margin: 2px 4px 2px 0;
    }

    /* Tip box */
    .tip-box {
      background: #fffbf0;
      border: 1px solid var(--gold);
      border-left: 4px solid var(--gold);
      border-radius: 0 6px 6px 0;
      padding: 14px 16px;
      margin-top: 12px;
      font-size: .82rem;
      color: var(--text);
    }

    .tip-box-title {
      font-weight: 700;
      color: var(--navy);
      margin-bottom: 4px;
      font-size: .78rem;
    }

    /* Copy button */
    .copy-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 4px 12px;
      font-size: .72rem;
      cursor: pointer;
      color: var(--text-light);
      font-family: inherit;
      transition: all .15s;
      float: right;
    }

    .copy-btn:hover {
      background: var(--navy);
      color: var(--white);
      border-color: var(--navy);
    }

    .copy-btn.copied {
      background: var(--green);
      color: var(--white);
      border-color: var(--green);
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 80px 40px;
      color: var(--text-light);
    }

    .empty-state .icon {
      font-size: 3rem;
      margin-bottom: 16px;
      opacity: .4;
    }

    .empty-state h3 {
      font-size: 1.1rem;
      color: var(--navy);
      margin-bottom: 8px;
    }

    .empty-state p {
      font-size: .85rem;
    }

    /* Responsive */
    @media (max-width: 900px) {
      .app-container {
        grid-template-columns: 1fr;
      }

      .input-panel {
        position: relative;
        top: 0;
        max-height: none;
        border-right: none;
        border-bottom: 1px solid var(--border);
      }

      .output-panel {
        max-height: none;
      }
    }

    /* Animations */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .script-section {
      animation: fadeInUp .3s ease-out;
    }

    .script-section:nth-child(2) { animation-delay: .05s; }
    .script-section:nth-child(3) { animation-delay: .1s; }
    .script-section:nth-child(4) { animation-delay: .15s; }
    .script-section:nth-child(5) { animation-delay: .2s; }
  </style>
</head>
<body>

<div class="app-header">
  <h1>
    B型肝炎給付金 トークスクリプト支援ツール
    <span class="badge">社内用</span>
  </h1>
  <span class="internal">対応者向け支援システム</span>
</div>

<div class="app-container">

  <!-- Left: Input Panel -->
  <div class="input-panel">
    <div class="panel-title">顧客情報・懸念事項入力</div>

    <div class="customer-info">
      <div class="info-row">
        <div class="info-field">
          <label>顧客の年代</label>
          <select id="ageGroup">
            <option value="">選択してください</option>
            <option value="30s">30代</option>
            <option value="40s">40代</option>
            <option value="50s">50代</option>
            <option value="60s">60代</option>
            <option value="70s">70代以上</option>
          </select>
        </div>
        <div class="info-field">
          <label>感染経路（分かれば）</label>
          <select id="infectionRoute">
            <option value="">不明・未確認</option>
            <option value="vaccination">集団予防接種</option>
            <option value="mother">母子感染</option>
            <option value="unknown">本人も不明</option>
          </select>
        </div>
      </div>
      <div class="info-row">
        <div class="info-field">
          <label>現在の病状</label>
          <select id="condition">
            <option value="">選択してください</option>
            <option value="carrier">無症候性キャリア</option>
            <option value="chronic">慢性肝炎</option>
            <option value="cirrhosis">肝硬変</option>
            <option value="cancer">肝がん</option>
            <option value="inheritance">相続相談</option>
            <option value="unknown">不明・未診断</option>
          </select>
        </div>
        <div class="info-field">
          <label>相談経緯</label>
          <select id="channel">
            <option value="">選択してください</option>
            <option value="web">Web検索</option>
            <option value="cm">TV・CM</option>
            <option value="referral">知人紹介</option>
            <option value="hospital">病院で聞いた</option>
            <option value="other">その他</option>
          </select>
        </div>
      </div>
    </div>

    <div class="quick-tags">
      <div class="quick-tags-label">よくある懸念事項（クリックで追加）</div>
      <div class="tag-group">
        <button class="tag-btn" data-tag="費用が心配">費用が心配</button>
        <button class="tag-btn" data-tag="手続きが面倒そう">手続きが面倒</button>
        <button class="tag-btn" data-tag="対象か分からない">対象か不明</button>
        <button class="tag-btn" data-tag="時効が心配">時効が心配</button>
        <button class="tag-btn" data-tag="家族に知られたくない">家族バレ不安</button>
        <button class="tag-btn" data-tag="証拠・資料がない">証拠がない</button>
        <button class="tag-btn" data-tag="他の事務所と比較中">他事務所比較</button>
        <button class="tag-btn" data-tag="給付金額を知りたい">金額知りたい</button>
        <button class="tag-btn" data-tag="忙しくて時間がない">時間がない</button>
        <button class="tag-btn" data-tag="本当にもらえるか不安">本当にもらえる？</button>
        <button class="tag-btn" data-tag="裁判が怖い">裁判が怖い</button>
        <button class="tag-btn" data-tag="高齢で体調が不安">高齢・体調不安</button>
      </div>
    </div>

    <div class="memo-area">
      <label for="memoInput">フリーメモ（顧客の懸念・発言を自由に入力）</label>
      <textarea id="memoInput" placeholder="例：費用がかかるのではないか心配している、手続きが難しそうで踏み出せない、自分が対象になるか分からない..."></textarea>
      <div class="char-count"><span id="charCount">0</span> 文字</div>
    </div>

    <div class="btn-row">
      <button class="generate-btn" onclick="generateScript()">トークスクリプトを生成</button>
      <button class="clear-btn" onclick="clearAll()">クリア</button>
    </div>
  </div>

  <!-- Right: Output Panel -->
  <div class="output-panel" id="outputPanel">
    <div class="empty-state" id="emptyState">
      <div class="icon">&#128172;</div>
      <h3>トークスクリプトを生成</h3>
      <p>左パネルで顧客の懸念事項を入力し、<br>「トークスクリプトを生成」ボタンを押してください。</p>
      <p style="margin-top: 16px; font-size: .78rem; color: #aab;">
        懸念タグのクリックやフリーメモへの入力で<br>最適なトークスクリプトがリアルタイムで表示されます。
      </p>
    </div>
    <div id="scriptOutput" style="display:none;"></div>
  </div>

</div>

<script>
const STRENGTHS = {
  freeCounseling: { label: '相談無料', text: '当事務所では相談料は一切いただいておりません。' },
  successFee: { label: '完全成功報酬', text: '着手金は0円、完全成功報酬制ですので、給付金を受け取るまで費用は一切かかりません。' },
  freeResearch: { label: '資料収集無料代行', text: '面倒な資料の収集や調査は、すべて当事務所が無料で代行いたします。' },
  noVisit: { label: '来所不要', text: '原則としてご来所は不要です。すべてお電話・WEB・郵送で完結いたします。' },
};

const CONCERN_SCRIPTS = {
  cost: {
    keywords: ['費用', 'お金', 'コスト', '料金', '高い', '払え', '心配', '経済的', '金銭', '値段', '価格'],
    title: '費用面の懸念への対応',
    icon: '&#128176;',
    concern: 'お客様は費用面に不安を感じています。',
    scripts: [
      {
        label: 'response',
        labelText: '推奨トーク',
        text: 'ご費用面のご不安、大変よく分かります。ご安心ください。当事務所では<strong>相談料は完全無料</strong>でございます。さらに、<strong>着手金も0円の完全成功報酬制</strong>を採用しておりますので、<strong>給付金をお受け取りになるまで、一切費用はかかりません</strong>。つまり、お客様のお手元からお金が出ていくことは一切ございません。'
      },
      {
        label: 'point',
        labelText: '補足ポイント',
        text: '万が一、給付金が受け取れなかった場合も費用は発生いたしませんので、<strong>リスクは完全にゼロ</strong>です。まずは無料相談で、お客様が対象になるかどうか確認させていただければと思います。'
      },
      {
        label: 'close',
        labelText: 'クロージング',
        text: '費用のことはまったくご心配いただかなくて大丈夫ですので、<strong>まずは無料相談で給付金の対象かどうかだけでも確認してみませんか？</strong>'
      }
    ],
    tip: '費用面の不安は最も多い懸念です。「0円」「一切かからない」「リスクゼロ」というキーワードを繰り返し伝えることが効果的です。',
    strengths: ['freeCounseling', 'successFee']
  },

  procedure: {
    keywords: ['面倒', '手続き', '複雑', '難し', '書類', '大変', '手間', 'わからない', '分からない', 'やり方'],
    title: '手続きの煩雑さへの懸念への対応',
    icon: '&#128203;',
    concern: 'お客様は手続きが面倒・複雑だと感じています。',
    scripts: [
      {
        label: 'response',
        labelText: '推奨トーク',
        text: 'お手続きが面倒なのではとご心配されるお気持ち、よく分かります。ですがご安心ください。<strong>面倒な資料の収集や調査は、すべて当事務所が無料で代行</strong>いたします。お客様にしていただくことは、最初にお話をお聞かせいただくことだけです。'
      },
      {
        label: 'point',
        labelText: '補足ポイント',
        text: 'さらに、<strong>原則としてご来所は不要</strong>です。すべてお電話・WEB・郵送で完結いたしますので、お忙しい方でも、遠方の方でも、ご負担なくお手続きいただけます。'
      },
      {
        label: 'close',
        labelText: 'クロージング',
        text: '具体的にどのような流れになるか、<strong>無料相談で詳しくご説明</strong>させていただきます。お話を聞いていただくだけでも構いませんので、いかがでしょうか？'
      }
    ],
    tip: '「お客様がやることはほとんどない」ことを具体的に伝えましょう。来所不要・郵送完結は大きな安心材料になります。',
    strengths: ['freeResearch', 'noVisit']
  },

  eligibility: {
    keywords: ['対象', '該当', '条件', '自分は', '資格', 'もらえる', '受けられる', '当てはまる', '適用'],
    title: '給付金対象かどうかの不安への対応',
    icon: '&#128269;',
    concern: 'お客様は自分が給付金の対象になるか分からず不安を感じています。',
    scripts: [
      {
        label: 'response',
        labelText: '推奨トーク',
        text: 'ご自身が対象になるかどうか、分からないのは当然のことです。実は、<strong>ご自身では対象外だと思っていた方が、調べてみたら対象だった</strong>というケースが非常に多くございます。'
      },
      {
        label: 'point',
        labelText: '補足ポイント',
        text: 'B型肝炎給付金は、昭和23年から昭和63年の間に集団予防接種を受けてB型肝炎ウイルスに感染された方が対象です。<strong>母子感染の方（二次感染）も対象</strong>になる場合があります。ただ、条件が細かいため、<strong>専門家が確認することで初めて分かる</strong>ことも多いです。'
      },
      {
        label: 'close',
        labelText: 'クロージング',
        text: '対象かどうかは<strong>無料相談で簡単に確認</strong>できます。<strong>調査費用も無料</strong>ですので、まずは一度お話をお聞かせいただけませんか？対象外だった場合も費用は一切かかりません。'
      }
    ],
    tip: '「対象外だと思っていたが実は対象だった」事例を伝えることで、相談へのハードルを下げましょう。「調べるだけならタダ」を強調。',
    strengths: ['freeCounseling', 'freeResearch']
  },

  statute: {
    keywords: ['時効', '期限', '間に合う', '遅い', '今さら', '期間', '過ぎ', '昔'],
    title: '時効・期限への懸念への対応',
    icon: '&#9200;',
    concern: 'お客様は申請期限や時効を心配しています。',

// Tag button handling
document.querySelectorAll('.tag-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    this.classList.toggle('active');
    const textarea = document.getElementById('memoInput');
    const tag = this.dataset.tag;

    if (this.classList.contains('active')) {
      textarea.value = textarea.value ? textarea.value + '、' + tag : tag;
    } else {
      textarea.value = textarea.value
        .replace(new RegExp('[、,]?' + tag.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '[、,]?'), '')
        .replace(/^[、,]+|[、,]+$/g, '');
    }

    updateCharCount();
  });
});

// Character count
document.getElementById('memoInput').addEventListener('input', updateCharCount);
function updateCharCount() {
  document.getElementById('charCount').textContent = document.getElementById('memoInput').value.length;
}

// Script generation
function generateScript() {
  const memo = document.getElementById('memoInput').value;
  const condition = document.getElementById('condition').value;

  if (!memo.trim()) {
    alert('懸念事項を入力してください。タグのクリックまたはフリーメモへの入力をお願いします。');
    return;
  }

  const matchedConcerns = [];
  const memoLower = memo.toLowerCase();

  for (const [key, concern] of Object.entries(CONCERN_SCRIPTS)) {
    for (const keyword of concern.keywords) {
      if (memoLower.includes(keyword)) {
        matchedConcerns.push(concern);
        break;
      }
    }
  }

  if (matchedConcerns.length === 0) {
    matchedConcerns.push(CONCERN_SCRIPTS.cost);
    matchedConcerns.push(CONCERN_SCRIPTS.procedure);
    matchedConcerns.push(CONCERN_SCRIPTS.eligibility);
  }

  renderScripts(matchedConcerns, condition);
}

function renderScripts(concerns, condition) {
  const output = document.getElementById('scriptOutput');
  const emptyState = document.getElementById('emptyState');

  emptyState.style.display = 'none';
  output.style.display = 'block';

  let html = '';

  // Opening
  html += renderSection(OPENING_SCRIPT, []);

  // Matched concern scripts
  concerns.forEach(concern => {
    html += renderSection(concern, concern.strengths || []);
  });

  // Condition-specific supplement
  if (condition) {
    const conditionScript = getConditionSupplement(condition);
    if (conditionScript) {
      html += renderSection(conditionScript, []);
    }
  }

  // Closing
  html += renderSection(CLOSING_SCRIPT, ['freeCounseling', 'successFee', 'noVisit', 'freeResearch']);

  output.innerHTML = html;
}

function renderSection(section, strengthKeys) {
  let html = `
    <div class="script-section">
      <div class="script-section-title">
        <span class="icon">${section.icon}</span>
        ${section.title}
        <button class="copy-btn" onclick="copySection(this)">コピー</button>
      </div>
      <div class="script-card">`;

  if (section.concern) {
    html += `<div><span class="script-label label-concern">顧客の懸念</span></div>
             <div class="script-text">${section.concern}</div>
             <hr class="script-divider">`;
  }

  section.scripts.forEach((script, i) => {
    const labelClass = 'label-' + script.label;
    html += `<div><span class="script-label ${labelClass}">${script.labelText}</span></div>
             <div class="script-text">${script.text}</div>`;
    if (i < section.scripts.length - 1) {
      html += '<hr class="script-divider">';
    }
  });

  if (strengthKeys && strengthKeys.length > 0) {
    html += '<hr class="script-divider"><div>';
    strengthKeys.forEach(key => {
      const s = STRENGTHS[key];
      if (s) {
        html += `<span class="strength-badge">${s.label}</span>`;
      }
    });
    html += '</div>';
  }

  if (section.tip) {
    html += `<div class="tip-box">
               <div class="tip-box-title">対応のポイント</div>
               ${section.tip}
             </div>`;
  }

  html += '</div></div>';
  return html;
}

      }]
    },
    inheritance: {
      title: '相続人（ご遺族）の方への補足トーク',
      icon: '&#128137;',
      scripts: [{
        label: 'point',
        labelText: '相続相談補足',
        text: 'B型肝炎給付金は、<strong>感染されたご本人が亡くなられている場合でも、ご遺族（相続人）の方が請求できます</strong>。給付金額は病状に応じて最大<strong>3,600万円</strong>に加え、訴訟手当金等が支給される場合もございます。<strong>必要な資料の収集もすべて無料で代行</strong>いたしますので、まずはお気軽にご相談ください。'

  };

  return supplements[condition] || null;
}

function clearAll() {
  document.getElementById('memoInput').value = '';
  document.getElementById('ageGroup').value = '';
  document.getElementById('infectionRoute').value = '';
  document.getElementById('condition').value = '';
  document.getElementById('channel').value = '';

  document.querySelectorAll('.tag-btn.active').forEach(btn => {
    btn.classList.remove('active');
  });

  updateCharCount();

  document.getElementById('scriptOutput').style.display = 'none';
  document.getElementById('scriptOutput').innerHTML = '';
  document.getElementById('emptyState').style.display = '';
}

function copySection(btn) {
  const card = btn.closest('.script-section');
  const textElements = card.querySelectorAll('.script-text');
  let text = '';
  textElements.forEach(el => {
    text += el.textContent.trim() + '\n\n';
  });

  navigator.clipboard.writeText(text.trim()).then(() => {
    btn.textContent = 'コピー完了';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = 'コピー';
      btn.classList.remove('copied');
    }, 2000);
  });
}
</script>
